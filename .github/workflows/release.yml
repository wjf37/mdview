name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
            bundles: ''
          - os: windows-latest
            label: windows
            # MSI only — WiX format triggers far fewer Defender false positives
            # than the NSIS installer. Portable .exe is also uploaded separately.
            bundles: '--bundles msi'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - run: npm ci

      - name: Set version from tag
        shell: bash
        run: node scripts/set-version.cjs "${GITHUB_REF_NAME#v}"

      # Write the PFX certificate to disk when the secret is present.
      # To enable: add WINDOWS_CERTIFICATE (base64-encoded .pfx) and
      # WINDOWS_CERTIFICATE_PASSWORD to your repository secrets.
      - name: Decode Windows signing certificate
        if: matrix.os == 'windows-latest' && env.WINDOWS_CERTIFICATE != ''
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
        shell: pwsh
        run: |
          $bytes = [System.Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          [System.IO.File]::WriteAllBytes("$env:RUNNER_TEMP\certificate.pfx", $bytes)

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE != '' && format('{0}\\certificate.pfx', env.RUNNER_TEMP) || '' }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: mdview ${{ github.ref_name }}
          args: ${{ matrix.bundles }}
          releaseBody: |
            ## Downloads

            | Platform | File |
            |----------|------|
            | Linux (deb) | `mdview_VERSION_amd64.deb` |
            | Linux (AppImage) | `mdview_VERSION_amd64.AppImage` |
            | Windows (MSI installer) | `mdview_VERSION_x64_en-US.msi` |
            | Windows (portable) | `mdview-VERSION-windows-portable.exe` |

            > **Windows note:** The binary is unsigned — if Defender flags it, use the portable `.exe` instead of the MSI, or add a Defender exclusion for the download folder.
          releaseDraft: true
          prerelease: false

      # Upload the raw portable exe as an additional release asset.
      # No installer = no dropper heuristics firing.
      - name: Upload portable Windows executable
        if: matrix.os == 'windows-latest'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release upload "${{ github.ref_name }}" \
            "src-tauri/target/release/mdview.exe#mdview-${VERSION}-windows-portable.exe" \
            --clobber

      # Clean up certificate file after build
      - name: Remove signing certificate
        if: matrix.os == 'windows-latest' && env.WINDOWS_CERTIFICATE != '' && always()
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
        shell: pwsh
        run: |
          $cert = "$env:RUNNER_TEMP\certificate.pfx"
          if (Test-Path $cert) { Remove-Item $cert -Force }
