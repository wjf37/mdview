name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
          - os: windows-latest
            label: windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - run: npm ci

      - name: Set version from tag
        shell: bash
        run: node scripts/set-version.cjs "${GITHUB_REF_NAME#v}"

      # Write the PFX certificate to disk when the secret is present.
      # To enable: add WINDOWS_CERTIFICATE (base64-encoded .pfx) and
      # WINDOWS_CERTIFICATE_PASSWORD to your repository secrets.
      - name: Decode Windows signing certificate
        if: matrix.os == 'windows-latest' && env.WINDOWS_CERTIFICATE != ''
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
        shell: pwsh
        run: |
          $bytes = [System.Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          [System.IO.File]::WriteAllBytes("$env:RUNNER_TEMP\certificate.pfx", $bytes)

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Passed through to tauri-action when present so the MSI/NSIS
          # bundles are signed. Leave unset to build unsigned.
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE != '' && format('{0}\\certificate.pfx', env.RUNNER_TEMP) || '' }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: mdview ${{ github.ref_name }}
          releaseBody: |
            ## Downloads

            | Platform | File |
            |----------|------|
            | Linux (deb) | `mdview_VERSION_amd64.deb` |
            | Linux (AppImage) | `mdview_VERSION_amd64.AppImage` |
            | Windows (installer) | `mdview_VERSION_x64-setup.exe` |
            | Windows (MSI) | `mdview_VERSION_x64_en-US.msi` |

            > **Windows note:** The binary is unsigned — Windows SmartScreen may show a warning on first run. Click **More info → Run anyway** to proceed.
          releaseDraft: true
          prerelease: false

      # Clean up certificate file after build
      - name: Remove signing certificate
        if: matrix.os == 'windows-latest' && env.WINDOWS_CERTIFICATE != '' && always()
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
        shell: pwsh
        run: |
          $cert = "$env:RUNNER_TEMP\certificate.pfx"
          if (Test-Path $cert) { Remove-Item $cert -Force }
