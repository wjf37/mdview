<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mdview</title>
  </head>
  <body>
    <div id="browse-view" class="view">
      <div class="view-header">
        <h2 id="browse-dir-name" class="dir-name"></h2>
        <button id="open-folder-btn" class="btn">Open Folder</button>
      </div>
      <div id="browse-error" class="error-message hidden"></div>
      <p id="no-files-msg" class="empty-message hidden">No markdown files found.</p>
      <ul id="file-list" class="file-list"></ul>
    </div>

    <div id="reader-view" class="view hidden">
      <div class="view-header">
        <button id="back-btn" class="btn">&#8592; Back</button>
        <span id="reader-filename" class="filename"></span>
      </div>
      <div id="reader-error" class="error-message hidden"></div>
      <article id="markdown-content" class="markdown-body"></article>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
